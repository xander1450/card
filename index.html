<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 25px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .heart {
      font-size: 30px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }

    .yes {
      background: #ff4d6d;
      color: white;
    }

    .no {
      background: #ddd;
      position: relative;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="heart">❤️</div>
  <h1>I'm Sorry 😔</h1>

  <p>
    Okay listen… before you get mad again 😭<br><br>
    I KNOW I messed up 🥲<br>
    But also… I’m your person 😌<br><br>
    And life without you = very boring + sad me 🐒<br><br>
    Can we fix this? 🥺👉👈
  </p>

  <div class="buttons">
    <button class="yes" onclick="yesClicked()">Okay ❤️</button>
    <button class="no" id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No 😤</button>
  </div>
</div>

<script>
  function yesClicked() {
    document.body.innerHTML = `
      <div style="text-align:center; padding:40px; font-family:sans-serif;">
        <h1>YAYYY 🥹❤️</h1>
        <p>I promise to behave… (at least 70%) 😜</p>
        <p>I really really love you 💖</p>
      </div>
    `;
  }

  function moveButton() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    btn.style.transform = `translate(${x}px, ${y}px)`;
  }
</script>

</body>
</html>
